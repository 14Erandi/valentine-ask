<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Carta de amor.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
        <img src="./envelope.png" alt="Envelope" id="envelope">
        <p>♡ Carta para Você ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Papoi?, quiere ser mi papoi?</h1>

            <img src="cat_heart.gif" class="cat" id="letter-cat">

            <div class="buttons" id="letter-buttons">
                <img src="yes.png" class="btn yes-btn" alt="Yes">

                <div class="no-wrapper">
                    <img src="no.png" class="btn no-btn" alt="No" />
                </div>
            </div>

            <p id="final-text" class="final-text" style="display: none">
                <strong>Valentin dia</strong> en el cuartao a las 7 de la tarde, te espero con tu mejor sonrisa y tu corazón abierto. <br><br>
                No es necesario traer nada, solo tu presencia y tu amor. <br><br>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
